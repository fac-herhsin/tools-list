<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具櫃雲端清點系統 - 10筆循環紀錄版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .tab-active { background-color: #2563eb; color: white; border-color: #2563eb; }
        .tab-summary { background-color: #f59e0b; color: white; border-color: #d97706; }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background-color: white; padding: 0; margin: 0; }
            .modal-print-container { position: absolute; left: 0; top: 0; width: 100%; }
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            opacity: 1;
            height: 30px;
        }

        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.2s ease-out; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-white shadow-sm border-b no-print sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i class="fa-solid fa-toolbox"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">工具櫃管理系統</h1>
            </div>
            <div id="sync-status" class="text-xs font-medium text-slate-400 flex items-center gap-2">
                <i class="fa-solid fa-cloud-check text-emerald-500"></i> 雲端已同步
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="tab-container" class="no-print flex flex-wrap gap-2 mb-8 justify-center"></div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-3 no-print">
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <div class="p-6 bg-slate-50 border-b flex justify-between items-end">
                        <div>
                            <h2 id="current-tab-name" class="text-2xl font-black text-slate-800 tracking-tighter">載入中...</h2>
                            <p class="text-sm text-slate-500 mt-1 font-medium">最後同步時間: <span id="last-sync-time" class="font-mono text-blue-600">--:--</span></p>
                        </div>
                        <div class="flex gap-6">
                            <div class="text-center">
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">正常項目</p>
                                <p id="stat-ok" class="text-2xl font-black text-emerald-500">0</p>
                            </div>
                            <div class="text-center">
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">異常項目</p>
                                <p id="stat-fail" class="text-2xl font-black text-red-500">0</p>
                            </div>
                        </div>
                    </div>

                    <div id="tool-list" class="divide-y divide-slate-100 min-h-[400px]"></div>

                    <div id="summary-notice" class="hidden p-4 bg-amber-50 border-t border-amber-100 text-amber-700 text-xs font-bold text-center no-print">
                        <i class="fa-solid fa-circle-info mr-1"></i> 異常匯總模式下僅供檢視。
                    </div>

                    <div class="p-6 bg-slate-50 border-t space-y-4 no-print">
                        <div class="flex flex-col md:flex-row gap-4">
                            <div class="flex-1 relative">
                                <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                                <input type="text" id="user-name" placeholder="清點人員姓名" class="w-full pl-10 pr-4 py-4 border rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold text-lg">
                            </div>
                            <div class="flex gap-2">
                                <button onclick="saveData()" id="save-btn" class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white font-black py-4 px-10 rounded-2xl transition shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                                    <i class="fa-solid fa-cloud-arrow-up text-xl"></i> 同步歸零 (保留10筆)
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1 no-print">
                <div class="bg-white rounded-2xl shadow-sm border p-6 sticky top-24">
                    <h3 class="font-bold text-slate-800 mb-6 flex items-center gap-2 text-lg">
                        <i class="fa-solid fa-clock-rotate-left text-blue-500"></i> 最近 10 筆清點紀錄
                    </h3>
                    <div id="log-list" class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
                        <div class="flex flex-col items-center justify-center py-8 text-slate-300">
                            <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
                            <span class="text-xs">讀取紀錄中...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal 彈窗同前 -->
    <div id="log-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm no-print">
        <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b flex justify-between items-start bg-slate-50">
                <div>
                    <h3 id="modal-title" class="text-xl font-black text-slate-800 tracking-tight">盤點異常報告</h3>
                    <p id="modal-subtitle" class="text-sm text-slate-500 mt-1 font-bold"></p>
                </div>
                <div class="flex gap-2">
                    <button onclick="printModalContent()" class="bg-white border p-2 rounded-xl hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-all text-slate-500">
                        <i class="fa-solid fa-print text-xl px-1"></i>
                    </button>
                    <button onclick="closeModal()" class="bg-white border p-2 rounded-xl hover:bg-slate-100 transition-colors text-slate-400">
                        <i class="fa-solid fa-xmark text-xl px-1"></i>
                    </button>
                </div>
            </div>
            <div id="modal-content" class="overflow-y-auto p-4 space-y-4 flex-1"></div>
            <div class="p-6 border-t bg-slate-50 flex gap-3">
                <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-2xl hover:bg-slate-200 transition-all">關閉</button>
                <button onclick="printModalContent()" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-2xl hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-print"></i> 列印異常單
                </button>
            </div>
        </div>
    </div>

    <div id="print-area" class="hidden print-only p-8"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz6x9_Gyesh2iH5RsnKJ1CQiNmhBDdl1aNOh9jaAv1-FNobfYwCj3vs-1GQ6FxHdT_ZDw/exec"; 
        const CACHE_KEY = "TOOL_INVENTORY_CACHE";
        const MAX_LOGS = 10; // 設定最大保留紀錄筆數

        let inventory = [];
        let logs = [];
        let currentTab = "";
        const SUMMARY_TAB = "異常匯總";

        async function init() {
            setSyncStatus("loading", "正在連線雲端...");
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                inventory = data.inventory.map(item => ({ ...item, current: 0 }));
                // 只保留前 10 筆（API 回傳通常是依日期排序，保留前10筆）
                logs = (data.logs || []).slice(0, MAX_LOGS);
                
                localStorage.setItem(CACHE_KEY, JSON.stringify(inventory));
                const categories = [...new Set(inventory.map(item => item.category))];
                if (!currentTab) currentTab = categories[0];
                renderUI(categories);
                setSyncStatus("success", "已與雲端同步 (已歸零)");
                document.getElementById('last-sync-time').innerText = new Date().toLocaleTimeString();
            } catch (err) {
                console.error(err);
                const cached = localStorage.getItem(CACHE_KEY);
                if(cached) {
                    inventory = JSON.parse(cached);
                    const categories = [...new Set(inventory.map(item => item.category))];
                    currentTab = categories[0];
                    renderUI(categories);
                }
                setSyncStatus("error", "連線失敗");
            }
        }

        function setSyncStatus(type, text) {
            const statusEl = document.getElementById('sync-status');
            statusEl.innerText = text;
            statusEl.className = `text-xs font-bold flex items-center gap-2 ${type === 'loading' ? 'text-blue-500' : type === 'error' ? 'text-red-500' : 'text-emerald-500'}`;
        }

        function renderUI(categories) {
            renderTabs(categories);
            renderTools();
            renderLogs();
        }

        function renderTabs(categories) {
            const container = document.getElementById('tab-container');
            const allTabs = [...categories, SUMMARY_TAB];
            container.innerHTML = allTabs.map(cat => {
                let activeClass = currentTab === cat ? (cat === SUMMARY_TAB ? 'tab-summary' : 'tab-active') : 'bg-white text-slate-500 border-white hover:border-blue-200 shadow-sm';
                return `<button onclick="switchTab('${cat}')" class="px-6 py-2 rounded-xl font-black transition-all border-2 ${activeClass}">${cat}</button>`;
            }).join('');
        }

        function switchTab(cat) {
            currentTab = cat;
            renderUI([...new Set(inventory.map(item => item.category))]);
        }

        function updateLocalValue(id, newVal) {
            const item = inventory.find(i => i.id == id);
            if (item) {
                item.current = parseInt(newVal) || 0;
                localStorage.setItem(CACHE_KEY, JSON.stringify(inventory));
                renderTools();
            }
        }

        function renderTools() {
            const container = document.getElementById('tool-list');
            const notice = document.getElementById('summary-notice');
            let ok = 0, fail = 0;

            if (currentTab === SUMMARY_TAB) {
                notice.classList.remove('hidden');
                document.getElementById('current-tab-name').innerText = "異常匯總報告";
                const shortages = inventory.filter(i => (i.current || 0) < i.standard);
                const surpluses = inventory.filter(i => (i.current || 0) > i.standard);
                let html = '<div class="p-4 bg-red-50 text-red-600 font-black border-b flex items-center gap-2"><i class="fa-solid fa-circle-minus"></i> 盤差 (缺件)</div>';
                html += shortages.length ? shortages.map(i => generateRow(i, true, true)).join('') : '<div class="p-8 text-center text-slate-400 text-sm">無缺件</div>';
                html += '<div class="p-4 bg-emerald-50 text-emerald-600 font-black border-b mt-4 flex items-center gap-2"><i class="fa-solid fa-circle-plus"></i> 盤盈 (多件)</div>';
                html += surpluses.length ? surpluses.map(i => generateRow(i, true, true)).join('') : '<div class="p-8 text-center text-slate-400 text-sm">無多件</div>';
                container.innerHTML = html;
                fail = shortages.length + surpluses.length;
                ok = inventory.length - fail;
            } else {
                notice.classList.add('hidden');
                document.getElementById('current-tab-name').innerText = currentTab;
                const displayItems = inventory.filter(i => i.category === currentTab);
                container.innerHTML = displayItems.map(i => {
                    if (i.current != i.standard) fail++; else ok++;
                    return generateRow(i, false, false);
                }).join('');
            }
            document.getElementById('stat-ok').innerText = ok;
            document.getElementById('stat-fail').innerText = fail;
        }

        function generateRow(item, showCategory, isReadOnly) {
            const currentVal = item.current || 0;
            const isErr = currentVal != item.standard;
            const diff = currentVal - item.standard;
            return `
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between p-5 ${isErr ? 'bg-orange-50/40' : 'hover:bg-slate-50'} transition-colors border-b last:border-0">
                    <div class="flex-1 min-w-0 mb-4 sm:mb-0">
                        <div class="flex items-center gap-2">
                            <span class="font-black text-slate-800 text-xl tracking-tight truncate">${item.name}</span>
                            <span class="text-xs text-slate-400 font-bold bg-slate-100 px-2 py-0.5 rounded">/ ${item.unit || '個'}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-6 w-full sm:w-auto justify-between sm:justify-end">
                        <div class="text-center min-w-[70px]">
                            <p class="text-[10px] text-slate-400 font-black uppercase mb-0.5">標配</p>
                            <p class="text-2xl font-black text-black tracking-tighter">${item.standard}</p>
                        </div>
                        <div class="text-center">
                            <input type="number" value="${currentVal}" 
                                ${isReadOnly ? 'readonly' : ''}
                                onchange="updateLocalValue(${item.id}, this.value)"
                                class="w-20 border-2 rounded-xl py-2.5 text-center font-black text-2xl outline-none transition-all ${isReadOnly ? 'bg-slate-50 border-slate-100 text-slate-400 cursor-not-allowed' : (isErr ? 'border-orange-500 text-orange-600 bg-orange-50 focus:ring-4 focus:ring-orange-100' : 'border-slate-200 text-blue-600 focus:ring-4 focus:ring-blue-100')}">
                        </div>
                        <div class="text-center min-w-[70px]">
                            <div class="text-2xl font-black tracking-tighter ${diff === 0 ? 'text-slate-200' : (diff < 0 ? 'text-red-500' : 'text-emerald-500')}">
                                ${diff > 0 ? '+' : ''}${diff}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function saveData() {
            const user = document.getElementById('user-name').value.trim();
            if (!user) return alert("請輸入您的姓名再進行同步。");
            const btn = document.getElementById('save-btn');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 同步並修剪紀錄中...';
            
            try {
                const snapshot = JSON.stringify(inventory.map(i => ({n: i.name, s: i.standard, c: i.current, cat: i.category})));
                const zeroInventory = inventory.map(item => ({ ...item, current: 0 }));
                
                // 發送 log 同時傳遞 limit 參數給後端 Google Apps Script 處理數量
                await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "update", data: zeroInventory }) });
                await fetch(API_URL, { 
                    method: "POST", 
                    body: JSON.stringify({ 
                        action: "log", 
                        user: user, 
                        event: "完成清點(循環紀錄)", 
                        snapshot: snapshot,
                        limit: MAX_LOGS // 告知後端只保留 10 筆
                    }) 
                });

                alert(`同步成功！已儲存紀錄並確保雲端僅保留最新的 ${MAX_LOGS} 筆資料。`);
                localStorage.removeItem(CACHE_KEY); 
                location.reload();
            } catch (err) {
                alert("連線失敗，請檢查網絡。");
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        }

        function renderLogs() {
            const container = document.getElementById('log-list');
            if(!logs || logs.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 text-sm py-8 italic font-medium">尚無歷史紀錄</div>';
                return;
            }
            container.innerHTML = logs.map((log, index) => {
                const date = new Date(log[0]);
                const timeStr = isNaN(date.getTime()) ? log[0] : date.toLocaleString('zh-TW', {hour12:false});
                const hasSnapshot = log[3] && log[3] !== ""; 
                return `
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 mb-3 last:mb-0 hover:border-blue-200 transition-colors">
                    <p class="text-[10px] text-slate-400 font-bold font-mono">${timeStr}</p>
                    <p class="text-sm font-black text-slate-700 mt-1">${log[2]}</p>
                    <div class="flex items-center justify-between mt-2">
                        <span class="text-xs text-blue-500 font-bold flex items-center gap-1">
                            <i class="fa-solid ${index === 0 ? 'fa-thumbtack' : 'fa-user-check'}"></i> ${log[1]}
                        </span>
                        ${hasSnapshot ? `<button onclick="viewSnapshot(${index})" class="text-[10px] bg-white border border-slate-200 px-2 py-1 rounded-md text-slate-500 font-bold hover:bg-blue-600 hover:text-white hover:border-blue-600 transition-all">查看異常</button>` : ''}
                    </div>
                </div>
                `;
            }).join('');
        }

        function viewSnapshot(logIndex) {
            const log = logs[logIndex];
            if (!log || !log[3]) return;
            try {
                const data = JSON.parse(log[3]);
                const errorItems = data.filter(item => item.c !== item.s);
                const modal = document.getElementById('log-modal');
                const content = document.getElementById('modal-content');
                const subtitleText = `${log[0]} - 清點人: ${log[1]}`;
                document.getElementById('modal-subtitle').innerText = subtitleText;
                
                if (errorItems.length === 0) {
                    content.innerHTML = '<div class="p-12 text-center text-slate-400 font-bold"><i class="fa-solid fa-circle-check text-emerald-500 text-4xl mb-4 block"></i> 該次盤點完全正常，無異常項目。</div>';
                    document.getElementById('print-area').innerHTML = `<div style="text-align:center; padding:50px;"><h1>盤點正常</h1><p>${subtitleText}</p></div>`;
                    modal.classList.remove('hidden');
                    return;
                }

                const groupedData = errorItems.reduce((acc, item) => {
                    const cat = item.cat || "未分類";
                    if (!acc[cat]) acc[cat] = [];
                    acc[cat].push(item);
                    return acc;
                }, {});

                let html = "";
                let printHtml = `<div style="text-align:center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px;"><h1 style="margin:0; font-size: 24px;">工具盤點異常清單</h1><p style="margin:5px 0; color: #666;">${subtitleText}</p></div>`;

                for (const cat in groupedData) {
                    html += `
                        <div class="mb-6">
                            <h4 class="flex items-center gap-2 text-red-600 font-black text-sm mb-2 bg-red-50 p-2 rounded-lg">
                                <i class="fa-solid fa-triangle-exclamation"></i> ${cat} - 區域異常
                            </h4>
                            <div class="space-y-1">
                                ${groupedData[cat].map(item => {
                                    const diff = item.c - item.s;
                                    const diffColor = diff < 0 ? 'text-red-500' : 'text-emerald-500';
                                    return `
                                        <div class="flex items-center px-4 py-2 border-b border-slate-50">
                                            <div class="flex-1 text-sm font-bold text-slate-700 truncate">${item.n}</div>
                                            <div class="w-12 text-center font-mono text-slate-400 text-xs">${item.s}</div>
                                            <div class="w-12 text-center font-mono font-black text-blue-600">${item.c}</div>
                                            <div class="w-12 text-center font-mono font-black ${diffColor}">${diff > 0 ? '+' : ''}${diff}</div>
                                        </div>`;
                                }).join('')}
                            </div>
                        </div>`;
                    
                    printHtml += `<h3>區域：${cat}</h3><table style="width:100%; border-collapse: collapse; margin-bottom: 20px;"><thead><tr style="background:#fef2f2;"><th>名稱</th><th>標配</th><th>實點</th><th>盤差</th></tr></thead><tbody>${groupedData[cat].map(item => `<tr><td style="border:1px solid #ddd;padding:6px;">${item.n}</td><td style="border:1px solid #ddd;padding:6px;text-align:center;">${item.s}</td><td style="border:1px solid #ddd;padding:6px;text-align:center;font-weight:bold;">${item.c}</td><td style="border:1px solid #ddd;padding:6px;text-align:center;color:${(item.c-item.s)<0?'red':'green'}">${(item.c-item.s)>0?'+':''}${item.c-item.s}</td></tr>`).join('')}</tbody></table>`;
                }

                content.innerHTML = html;
                document.getElementById('print-area').innerHTML = printHtml;
                modal.classList.remove('hidden');
            } catch (e) { alert("解析數據錯誤。"); }
        }

        function printModalContent() { window.print(); }
        function closeModal() { document.getElementById('log-modal').classList.add('hidden'); }
        window.onclick = function(event) { if (event.target == document.getElementById('log-modal')) closeModal(); }
        window.onload = init;
    </script>
</body>
</html>
