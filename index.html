<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具櫃雲端清點系統 - 連線修正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background-color: white !important; }
            .shadow-xl { box-shadow: none !important; border: 1px solid #eee !important; }
        }
        .print-only { display: none; }
        .tab-active { background-color: #2563eb; color: white; border-color: #2563eb; }
        .tab-summary { background-color: #f59e0b; color: white; border-color: #d97706; }
        
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- 標頭 -->
        <header class="text-center mb-10 no-print">
            <h1 class="text-3xl font-bold text-slate-800 flex items-center justify-center gap-3">
                <i class="fa-solid fa-boxes-stacked text-blue-600"></i> 工具櫃雲端清點系統
            </h1>
            <p id="sync-status" class="text-slate-500 mt-2 text-sm font-medium">正在連線雲端資料庫...</p>
        </header>

        <!-- 列印標頭 -->
        <div class="hidden print-only text-center mb-8 border-b-2 border-black pb-4">
            <h1 class="text-3xl font-bold">工具櫃盤點報表 (異常彙整)</h1>
            <p id="print-date" class="text-sm mt-1"></p>
        </div>

        <!-- 區域分頁 -->
        <div id="tab-container" class="no-print flex justify-center flex-wrap gap-2 mb-8"></div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-3 space-y-6">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-50/50">
                        <div>
                            <h2 id="current-tab-name" class="text-2xl font-bold text-slate-700 underline decoration-blue-500 underline-offset-8">載入中...</h2>
                            <p class="text-sm text-slate-400 mt-2">最後同步: <span id="last-sync-time">--:--</span></p>
                        </div>
                        <div class="flex gap-8">
                            <div class="text-center">
                                <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">齊全</p>
                                <p id="stat-ok" class="text-2xl font-bold text-green-500">0</p>
                            </div>
                            <div class="text-center">
                                <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">異常項目</p>
                                <p id="stat-fail" class="text-2xl font-bold text-red-500">0</p>
                            </div>
                        </div>
                    </div>

                    <div id="tool-list" class="divide-y divide-slate-100 min-h-[300px]">
                        <div class="p-20 text-center text-slate-400">連線中，請稍候...</div>
                    </div>

                    <div class="p-6 bg-slate-50 border-t border-slate-100 space-y-4 no-print">
                        <div class="flex flex-col md:flex-row gap-4">
                            <div class="flex-1 relative">
                                <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                                <input type="text" id="user-name" placeholder="輸入清點人員姓名" class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-all">
                            </div>
                            <div class="flex gap-2">
                                <button onclick="saveData()" id="save-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition shadow-lg shadow-blue-200 flex items-center gap-2">
                                    <i class="fa-solid fa-cloud-arrow-up"></i> 存檔同步
                                </button>
                                <button onclick="window.print()" class="bg-slate-800 hover:bg-black text-white font-bold py-3 px-6 rounded-xl transition shadow-lg flex items-center gap-2">
                                    <i class="fa-solid fa-print"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1 space-y-6 no-print">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                    <h3 class="font-bold text-slate-700 mb-6 flex items-center gap-2 text-lg">
                        <i class="fa-solid fa-history text-blue-500"></i> 最近 10 筆紀錄
                    </h3>
                    <div id="log-list" class="space-y-6"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz6x9_Gyesh2iH5RsnKJ1CQiNmhBDdl1aNOh9jaAv1-FNobfYwCj3vs-1GQ6FxHdT_ZDw/exec"; 
        const CACHE_KEY = "TOOL_SYS_LOCAL_DATA";

        let inventory = [];
        let logs = [];
        let currentTab = "";
        const SUMMARY_TAB = "異常匯總";

        // 強制轉換數值的函數，會自動過濾掉中文字
        function safeParseInt(val) {
            if (val === undefined || val === null) return 0;
            // 如果是字串，過濾掉非數字字符
            const cleanVal = String(val).replace(/[^\d]/g, '');
            const parsed = parseInt(cleanVal, 10);
            return isNaN(parsed) ? 0 : parsed;
        }

        async function init() {
            updateStatus("連線中...", "blue");
            
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                try {
                    inventory = JSON.parse(cached);
                    renderEverything();
                } catch(e) { console.error("Cache error", e); }
            }

            try {
                const res = await fetch(API_URL, { method: 'GET', headers: { 'Accept': 'application/json' } });
                if (!res.ok) throw new Error(`連線失敗: ${res.status}`);

                const data = await res.json();
                
                // 數據清洗：確保標準數量與實點數量都是純數字
                inventory = data.inventory.map(item => {
                    const std = safeParseInt(item.standard);
                    const cur = safeParseInt(item.current);
                    return {
                        ...item,
                        standard: std,
                        current: cur,
                        order_qty: item.order_qty !== undefined ? safeParseInt(item.order_qty) : Math.max(0, std - cur)
                    };
                });
                
                logs = data.logs || [];
                localStorage.setItem(CACHE_KEY, JSON.stringify(inventory));
                
                const categories = [...new Set(inventory.map(item => item.category))];
                if (!currentTab && categories.length > 0) currentTab = categories[0];
                
                renderEverything(categories);
                updateStatus("雲端已同步", "emerald");
                document.getElementById('last-sync-time').innerText = new Date().toLocaleTimeString();
            } catch (err) {
                console.error("Fetch error:", err);
                updateStatus("同步失敗", "red");
            }
        }

        function updateStatus(text, color) {
            const el = document.getElementById('sync-status');
            el.innerText = text;
            el.className = `text-sm font-bold mt-2 text-${color}-500`;
        }

        function renderEverything(categories) {
            if(!categories) categories = [...new Set(inventory.map(item => item.category))];
            renderTabs(categories);
            renderTools();
            renderLogs();
        }

        function renderTabs(categories) {
            const container = document.getElementById('tab-container');
            const allTabs = [...categories, SUMMARY_TAB];
            container.innerHTML = allTabs.map(cat => {
                let activeClass = currentTab === cat ? (cat === SUMMARY_TAB ? 'tab-summary' : 'tab-active') : 'bg-white text-slate-500 border-slate-100 hover:border-blue-200';
                return `<button onclick="switchTab('${cat}')" class="px-6 py-2 rounded-full font-bold transition-all border-2 ${activeClass}">${cat}</button>`;
            }).join('');
        }

        function switchTab(cat) {
            currentTab = cat;
            renderEverything();
        }

        function updateLocal(id, val) {
            const item = inventory.find(i => i.id == id);
            if (item) {
                item.current = safeParseInt(val);
                item.order_qty = Math.max(0, item.standard - item.current);
                saveToCacheAndRefresh();
            }
        }

        function updateOrderQty(id, val) {
            const item = inventory.find(i => i.id == id);
            if (item) {
                item.order_qty = safeParseInt(val);
                saveToCacheAndRefresh();
            }
        }

        function saveToCacheAndRefresh() {
            localStorage.setItem(CACHE_KEY, JSON.stringify(inventory));
            renderTools();
            updateStatus("本地已修改 (尚未存檔)", "orange");
        }

        function renderTools() {
            const container = document.getElementById('tool-list');
            let ok = 0, fail = 0;
            
            if (currentTab === SUMMARY_TAB) {
                document.getElementById('current-tab-name').innerText = "異常匯總 / 採購需求調整";
                const shortage = inventory.filter(i => i.current < i.standard);
                const surplus = inventory.filter(i => i.current > i.standard);
                
                let html = `<div class="p-4 bg-red-50 text-red-600 font-bold border-b flex justify-between items-center">
                                <span class="flex items-center gap-2"><i class="fa-solid fa-triangle-exclamation"></i> 盤差 (缺件應補)</span>
                            </div>`;
                html += shortage.length ? shortage.map(i => generateRow(i, true)).join('') : `<div class="p-10 text-center text-slate-400">目前無缺件</div>`;
                
                html += `<div class="p-4 bg-emerald-50 text-emerald-600 font-bold border-b mt-4 flex items-center gap-2"><i class="fa-solid fa-circle-plus"></i> 盤盈 (多出項目)</div>`;
                html += surplus.length ? surplus.map(i => generateRow(i)).join('') : `<div class="p-10 text-center text-slate-400">目前無多出項目</div>`;
                
                container.innerHTML = html;
                fail = shortage.length + surplus.length;
                ok = inventory.length - fail;
            } else {
                document.getElementById('current-tab-name').innerText = currentTab;
                const items = inventory.filter(i => i.category === currentTab);
                container.innerHTML = items.length ? items.map(i => {
                    if (i.current != i.standard) fail++; else ok++;
                    return generateRow(i);
                }).join('') : '<div class="p-20 text-center text-slate-400">此區域無資料</div>';
            }

            document.getElementById('stat-ok').innerText = ok;
            document.getElementById('stat-fail').innerText = fail;
        }

        function generateRow(item, isSummaryMode = false) {
            const isErr = item.current != item.standard;
            const isShort = item.current < item.standard;
            const displayOrderQty = item.order_qty;

            return `
                <div class="flex items-center justify-between p-5 transition-all ${isErr ? (isShort ? 'bg-red-50/50' : 'bg-emerald-50/30') : 'hover:bg-slate-50'}">
                    <div class="flex flex-col flex-1 min-w-0">
                        <span class="font-bold text-slate-700 truncate">${item.name}</span>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-[10px] bg-slate-200 text-slate-500 px-2 py-0.5 rounded font-bold uppercase tracking-tighter">${item.category}</span>
                            <span class="text-[10px] text-slate-400 font-mono">ID: ${item.id}</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3 md:gap-6">
                        <div class="text-center">
                            <p class="text-[10px] text-slate-300 font-bold uppercase">標配</p>
                            <p class="font-bold text-slate-500">${item.standard}</p>
                        </div>
                        <div class="text-center">
                            <p class="text-[10px] text-blue-400 font-bold uppercase">實點</p>
                            <input type="number" value="${item.current}" 
                                onchange="updateLocal(${item.id}, this.value)"
                                class="w-12 md:w-16 border-2 rounded-xl py-1 text-center font-black outline-none no-print ${isErr ? 'border-orange-500 text-orange-600' : 'border-blue-500 text-blue-700'}">
                            <span class="hidden print-only font-black text-xl">${item.current}</span>
                        </div>
                        <div class="text-center bg-slate-100/50 p-2 rounded-xl border border-dashed border-slate-200">
                            <p class="text-[10px] ${isShort ? 'text-red-500' : 'text-slate-400'} font-bold uppercase">應補</p>
                            <input type="number" value="${displayOrderQty}" 
                                onchange="updateOrderQty(${item.id}, this.value)"
                                class="w-12 md:w-14 bg-transparent text-center font-black outline-none no-print ${isShort ? 'text-red-600' : 'text-slate-400'}">
                            <span class="hidden print-only font-black text-lg ${isShort ? 'text-red-600' : ''}">${displayOrderQty}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLogs() {
            const container = document.getElementById('log-list');
            if(!logs || logs.length === 0) {
                container.innerHTML = '<p class="text-slate-400 text-center py-10">尚無雲端紀錄</p>';
                return;
            }
            container.innerHTML = logs.map(log => `
                <div class="relative pl-6 border-l-2 border-slate-100 pb-2">
                    <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-blue-500 border-4 border-white"></div>
                    <p class="text-[10px] text-slate-400">${log[0] ? new Date(log[0]).toLocaleString() : '未知時間'}</p>
                    <p class="text-sm font-bold text-slate-700 mt-1">${log[1] || '系統'}</p>
                    <p class="text-xs text-blue-600 mt-1">${log[2] || '事件'}</p>
                </div>
            `).join('');
        }

        async function saveData() {
            const user = document.getElementById('user-name').value.trim();
            if (!user) return alert("請輸入清點人員姓名。");
            
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 同步中...';

            try {
                await postToScript({ action: "update", data: inventory });
                await postToScript({ action: "log", user: user, event: `${currentTab} 盤點/請購存檔` });
                alert("同步成功！數字格式已自動修正並存檔。");
                localStorage.removeItem(CACHE_KEY); 
                location.reload(); 
            } catch (err) {
                console.error("Save error:", err);
                alert("存檔失敗！");
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> 存檔同步';
            }
        }

        async function postToScript(payload) {
            return fetch(API_URL, { method: "POST", mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
        }

        window.onload = init;
    </script>
</body>
</html>
