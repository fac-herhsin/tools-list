<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何鑫工具櫃雲端清點系統 - 簽署整合版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .tab-active { background-color: #2563eb; color: white; border-color: #2563eb; }
        .tab-summary { background-color: #f59e0b; color: white; border-color: #d97706; }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background-color: white; padding: 0; margin: 0; }
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            opacity: 1;
            height: 30px;
        }

        .sig-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-white shadow-sm border-b no-print sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i class="fa-solid fa-toolbox"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">工具櫃管理系統</h1>
            </div>
            <div id="sync-status" class="text-xs font-medium text-slate-400 flex items-center gap-2">
                <i class="fa-solid fa-cloud-check text-emerald-500"></i> 雲端已同步
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- 分頁標籤 -->
        <div id="tab-container" class="no-print flex flex-wrap gap-2 mb-4 justify-center"></div>

        <!-- 全域簽署進度檢查器 -->
        <div id="progress-checker" class="no-print grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3 mb-8"></div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-3 no-print">
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <div class="p-6 bg-slate-50 border-b flex justify-between items-end">
                        <div>
                            <h2 id="current-tab-name" class="text-2xl font-black text-slate-800 tracking-tighter">載入中...</h2>
                            <p class="text-sm text-slate-500 mt-1 font-medium">最後同步時間: <span id="last-sync-time" class="font-mono text-blue-600">--:--</span></p>
                        </div>
                        <div class="flex gap-6">
                            <div class="text-center">
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">正常項目</p>
                                <p id="stat-ok" class="text-2xl font-black text-emerald-500">0</p>
                            </div>
                            <div class="text-center">
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">異常項目</p>
                                <p id="stat-fail" class="text-2xl font-black text-red-500">0</p>
                            </div>
                        </div>
                    </div>

                    <div id="tool-list" class="divide-y divide-slate-100 min-h-[400px]"></div>

                    <div id="summary-notice" class="hidden p-4 bg-amber-50 border-t border-amber-100 text-amber-700 text-xs font-bold text-center no-print">
                        <i class="fa-solid fa-circle-info mr-1"></i> 請在此頁面確認所有異常項目，並完成全部分頁簽署後送出。
                    </div>

                    <div class="p-6 bg-slate-50 border-t space-y-4 no-print">
                        <div id="sig-input-section" class="flex flex-col gap-2">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">分頁清點簽署</label>
                            <div class="relative">
                                <i class="fa-solid fa-pen-nib absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                                <input type="text" id="user-name" 
                                       oninput="updateCurrentSig(this.value)"
                                       placeholder="請輸入此分頁清點人員姓名" 
                                       class="w-full pl-10 pr-4 py-4 border rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold text-lg">
                            </div>
                        </div>

                        <div id="sync-action-section" class="hidden space-y-4">
                            <div id="sync-warning" class="hidden p-3 bg-red-50 text-red-500 rounded-xl text-xs font-bold border border-red-100 text-center"></div>
                            <button onclick="saveData()" id="save-btn" disabled
                                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 px-10 rounded-2xl transition shadow-lg shadow-blue-200 flex items-center justify-center gap-3 disabled:bg-slate-300 disabled:shadow-none text-xl">
                                <i class="fa-solid fa-cloud-arrow-up"></i> 確認異常並同步雲端
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1 no-print">
                <div class="bg-white rounded-2xl shadow-sm border p-6 sticky top-24">
                    <h3 class="font-bold text-slate-800 mb-6 flex items-center gap-2 text-lg">
                        <i class="fa-solid fa-clock-rotate-left text-blue-500"></i> 最近 10 筆紀錄
                    </h3>
                    <div id="log-list" class="space-y-4 max-h-[600px] overflow-y-auto pr-2"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal 彈窗區 -->
    <div id="log-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm no-print">
        <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b flex justify-between items-start bg-slate-50">
                <div>
                    <h3 id="modal-title" class="text-xl font-black text-slate-800 tracking-tight">盤點異常報告</h3>
                    <p id="modal-subtitle" class="text-sm text-slate-500 mt-1 font-bold"></p>
                </div>
                <div class="flex gap-2">
                    <button onclick="printModalContent()" class="bg-white border p-2 rounded-xl hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-all text-slate-500">
                        <i class="fa-solid fa-print text-xl px-1"></i>
                    </button>
                    <button onclick="closeModal()" class="bg-white border p-2 rounded-xl hover:bg-slate-100 transition-colors text-slate-400">
                        <i class="fa-solid fa-xmark text-xl px-1"></i>
                    </button>
                </div>
            </div>
            <!-- 內容區 -->
            <div id="modal-content" class="overflow-y-auto p-0 flex-1"></div>
            
            <div class="p-6 border-t bg-white flex gap-3">
                <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-4 rounded-2xl hover:bg-slate-200 transition-all">關閉</button>
                <button onclick="printModalContent()" class="flex-1 bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-100 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-print"></i> 列印異常單
                </button>
            </div>
        </div>
    </div>

    <!-- 隱藏的列印區 -->
    <div id="print-area" class="hidden print-only p-8"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz6x9_Gyesh2iH5RsnKJ1CQiNmhBDdl1aNOh9jaAv1-FNobfYwCj3vs-1GQ6FxHdT_ZDw/exec"; 
        const MAX_LOGS = 10;

        let inventory = [];
        let logs = [];
        let currentTab = "";
        let pageSigs = {}; 
        const SUMMARY_TAB = "異常匯總";

        async function init() {
            setSyncStatus("loading", "正在連線雲端...");
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                inventory = data.inventory.map(item => ({ ...item, current: 0 }));
                logs = (data.logs || []).slice(0, MAX_LOGS);
                const categories = [...new Set(inventory.map(item => item.category))];
                if (!currentTab) currentTab = categories[0];
                renderUI(categories);
                setSyncStatus("success", "已與雲端同步 (已歸零)");
                document.getElementById('last-sync-time').innerText = new Date().toLocaleTimeString();
            } catch (err) {
                console.error(err);
                setSyncStatus("error", "連線失敗");
                inventory = [
                    {id:1, name:"螺絲起子", category:"手工具", standard:5, current:0, unit:"把"},
                    {id:2, name:"鐵鎚", category:"手工具", standard:2, current:0, unit:"支"},
                    {id:3, name:"衝擊起子", category:"電鑽類", standard:3, current:0, unit:"台"}
                ];
                currentTab = "手工具";
                renderUI(["手工具", "電鑽類"]);
            }
        }

        function updateCurrentSig(val) {
            if (currentTab !== SUMMARY_TAB) {
                pageSigs[currentTab] = val.trim();
                updateProgressChecker();
            }
        }

        function checkAllSigned() {
            const cats = [...new Set(inventory.map(i => i.category))];
            const missing = cats.filter(c => !pageSigs[c] || pageSigs[c] === "");
            return { all: missing.length === 0, missing };
        }

        function updateProgressChecker() {
            const { all, missing } = checkAllSigned();
            const cats = [...new Set(inventory.map(i => i.category))];
            const container = document.getElementById('progress-checker');
            const btn = document.getElementById('save-btn');
            const warning = document.getElementById('sync-warning');

            container.innerHTML = cats.map(c => {
                const isOk = pageSigs[c];
                const isActive = currentTab === c;
                return `
                    <div class="sig-card flex items-center justify-between p-3 rounded-xl border-2 ${isActive ? 'border-blue-500 bg-blue-50 ring-2 ring-blue-100' : (isOk ? 'bg-emerald-50 border-emerald-200 text-emerald-600' : 'bg-white border-slate-100 text-slate-300')}">
                        <span class="text-xs font-black truncate">${c}</span>
                        <i class="fa-solid ${isOk ? 'fa-circle-check' : 'fa-circle-dot'} text-[10px]"></i>
                    </div>
                `;
            }).join('');

            if (currentTab === SUMMARY_TAB) {
                if (!all) {
                    btn.disabled = true;
                    warning.innerText = `⚠️ 尚未完成簽署分頁：${missing.join(', ')}`;
                    warning.classList.remove('hidden');
                } else {
                    btn.disabled = false;
                    warning.classList.add('hidden');
                }
            }
        }

        function switchTab(cat) {
            currentTab = cat;
            const sigInput = document.getElementById('user-name');
            const sigSection = document.getElementById('sig-input-section');
            const syncSection = document.getElementById('sync-action-section');
            
            if (cat === SUMMARY_TAB) {
                sigSection.classList.add('hidden');
                syncSection.classList.remove('hidden');
            } else {
                sigSection.classList.remove('hidden');
                syncSection.classList.add('hidden');
                sigInput.value = pageSigs[cat] || "";
            }
            renderUI([...new Set(inventory.map(item => item.category))]);
        }

        function renderUI(categories) {
            renderTabs(categories);
            renderTools();
            renderLogs();
            updateProgressChecker();
        }

        function renderTabs(categories) {
            const container = document.getElementById('tab-container');
            const allTabs = [...categories, SUMMARY_TAB];
            container.innerHTML = allTabs.map(cat => {
                let activeClass = currentTab === cat ? (cat === SUMMARY_TAB ? 'tab-summary' : 'tab-active') : 'bg-white text-slate-500 border-white hover:border-blue-200 shadow-sm';
                return `<button onclick="switchTab('${cat}')" class="px-6 py-2 rounded-xl font-black transition-all border-2 ${activeClass}">${cat}</button>`;
            }).join('');
        }

        function renderTools() {
            const container = document.getElementById('tool-list');
            const notice = document.getElementById('summary-notice');
            let ok = 0, fail = 0;

            if (currentTab === SUMMARY_TAB) {
                notice.classList.remove('hidden');
                document.getElementById('current-tab-name').innerText = "異常匯總報告";
                const shortages = inventory.filter(i => (i.current || 0) < i.standard);
                const surpluses = inventory.filter(i => (i.current || 0) > i.standard);
                
                let html = `
                    <div class="p-8 bg-white text-center border-b">
                        <div class="inline-block p-4 bg-amber-100 rounded-full text-amber-600 mb-4">
                            <i class="fa-solid fa-clipboard-list text-3xl"></i>
                        </div>
                        <h3 class="text-xl font-black text-slate-800 tracking-tighter">盤點異常報告表</h3>
                        <p class="text-slate-400 text-xs mt-1 font-bold">INVENTORY EXCEPTION REPORT</p>
                    </div>
                `;

                html += '<div class="p-4 bg-red-50 text-red-600 font-black border-b flex items-center gap-2"><i class="fa-solid fa-triangle-exclamation"></i> 缺少項目 (需補齊)</div>';
                html += shortages.length ? shortages.map(i => generateRow(i, true, true)).join('') : '<div class="p-8 text-center text-slate-400 text-sm">✨ 所有項目皆無短缺</div>';
                html += '<div class="p-4 bg-emerald-50 text-emerald-600 font-black border-b mt-4 flex items-center gap-2"><i class="fa-solid fa-circle-plus"></i> 多出項目 (需核對)</div>';
                html += surpluses.length ? surpluses.map(i => generateRow(i, true, true)).join('') : '<div class="p-8 text-center text-slate-400 text-sm">✨ 所有項目皆無多出</div>';
                container.innerHTML = html;
                fail = shortages.length + surpluses.length;
                ok = inventory.length - fail;
            } else {
                notice.classList.add('hidden');
                document.getElementById('current-tab-name').innerText = currentTab;
                const displayItems = inventory.filter(i => i.category === currentTab);
                container.innerHTML = displayItems.map(i => {
                    if (i.current != i.standard) fail++; else ok++;
                    return generateRow(i, false, false);
                }).join('');
            }
            document.getElementById('stat-ok').innerText = ok;
            document.getElementById('stat-fail').innerText = fail;
        }

        function generateRow(item, showCategory, isReadOnly) {
            const currentVal = item.current || 0;
            const isErr = currentVal != item.standard;
            const diff = currentVal - item.standard;
            return `
                <div class="flex items-center justify-between p-5 ${isErr ? 'bg-orange-50/40' : 'hover:bg-slate-50'} transition-colors border-b last:border-0">
                    <div class="flex-1">
                        <span class="font-black text-slate-800 text-xl tracking-tight">${item.name}</span>
                        <span class="text-xs text-slate-400 ml-2">/ ${item.unit || '個'} ${showCategory ? `<span class="bg-slate-200 px-1.5 py-0.5 rounded ml-1 text-slate-600">${item.category}</span>` : ''}</span>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="text-center min-w-[50px]">
                            <p class="text-[10px] text-slate-400 font-bold uppercase">標配</p>
                            <p class="text-xl font-black">${item.standard}</p>
                        </div>
                        <input type="number" value="${currentVal}" 
                               ${isReadOnly ? 'readonly' : ''}
                               onchange="updateLocalValue(${item.id}, this.value)"
                               class="w-20 border-2 rounded-xl py-2 text-center font-black text-xl outline-none ${isReadOnly ? 'bg-slate-50 border-slate-100 text-slate-400' : (isErr ? 'border-orange-500 text-orange-600 bg-orange-50' : 'border-slate-200 text-blue-600')}">
                        <div class="text-center min-w-[50px]">
                            <p class="text-xl font-black ${diff === 0 ? 'text-slate-200' : (diff < 0 ? 'text-red-500' : 'text-emerald-500')}">
                                ${diff > 0 ? '+' : ''}${diff}
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        function updateLocalValue(id, newVal) {
            const item = inventory.find(i => i.id == id);
            if (item) {
                item.current = parseInt(newVal) || 0;
                renderTools();
                updateProgressChecker();
            }
        }

        // --- 核心修改：歷史紀錄 Modal 邏輯 (符合圖片 UI) ---
        function showLogDetail(index) {
            const log = logs[index];
            if (!log || !log[3]) return;
            const snapshot = JSON.parse(log[3]);
            const time = log[0];
            const users = log[1];

            document.getElementById('modal-subtitle').innerText = `${time} - 清點人: ${users}`;
            
            // 按類別分組
            const categories = [...new Set(snapshot.map(i => i.cat))];
            
            let html = '<div class="divide-y divide-slate-100">';
            
            categories.forEach(cat => {
                const itemsInCat = snapshot.filter(i => i.cat === cat && i.c !== i.s);
                if (itemsInCat.length > 0) {
                    // 區域標題列 (紅色背景)
                    html += `
                        <div class="bg-red-50 px-6 py-2 flex items-center gap-2">
                            <i class="fa-solid fa-triangle-exclamation text-red-500 text-xs"></i>
                            <span class="text-red-700 font-black text-sm">${cat} - 區域異常</span>
                        </div>
                    `;
                    
                    // 該類別下的異常項目
                    itemsInCat.forEach(item => {
                        const diff = item.c - item.s;
                        html += `
                            <div class="px-6 py-4 flex items-center justify-between bg-white">
                                <span class="font-bold text-slate-700 text-base">${item.n}</span>
                                <div class="flex items-center gap-8">
                                    <span class="text-slate-300 font-bold text-sm w-4 text-center">${item.s}</span>
                                    <span class="text-blue-600 font-black text-lg w-4 text-center">${item.c}</span>
                                    <span class="font-black text-lg w-8 text-right ${diff > 0 ? 'text-emerald-500' : 'text-red-500'}">
                                        ${diff > 0 ? '+' : ''}${diff}
                                    </span>
                                </div>
                            </div>
                        `;
                    });
                }
            });

            const hasAnyError = snapshot.some(i => i.c !== i.s);
            if (!hasAnyError) {
                html += '<div class="p-12 text-center text-slate-400 font-bold">✨ 此紀錄無任何異常項目</div>';
            }
            
            html += '</div>';

            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('log-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('log-modal').classList.add('hidden');
        }

        function printModalContent() {
            const content = document.getElementById('modal-content').innerHTML;
            const subtitle = document.getElementById('modal-subtitle').innerText;
            const printArea = document.getElementById('print-area');
            
            // 為了列印美觀，微調列印樣式
            printArea.innerHTML = `
                <div style="font-family: sans-serif; padding: 20px;">
                    <h1 style="font-size: 24px; font-weight: 900; text-align: center; margin-bottom: 4px;">盤點異常報告</h1>
                    <p style="text-align: center; font-size: 12px; color: #666; margin-bottom: 24px;">${subtitle}</p>
                    <div style="border: 1px solid #eee; border-radius: 8px; overflow: hidden;">
                        ${content}
                    </div>
                </div>
            `;
            window.print();
        }

        async function saveData() {
            const { all } = checkAllSigned();
            if (!all) return alert(`請完成所有分頁簽署！`);

            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 同步中...';
            const allUsers = Object.entries(pageSigs).map(([cat, name]) => `${cat}:${name}`).join(', ');

            try {
                const snapshot = JSON.stringify(inventory.map(i => ({n: i.name, s: i.standard, c: i.current, cat: i.category})));
                const zeroInventory = inventory.map(item => ({ ...item, current: 0 }));
                
                await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "update", data: zeroInventory }) });
                await fetch(API_URL, { 
                    method: "POST", 
                    body: JSON.stringify({ 
                        action: "log", 
                        user: allUsers, 
                        event: "完成分頁簽署清點", 
                        snapshot: snapshot,
                        limit: MAX_LOGS
                    }) 
                });

                alert("同步成功！資料已歸零。");
                location.reload();
            } catch (err) {
                alert("連線失敗。");
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> 確認異常並同步雲端';
            }
        }

        function renderLogs() {
            const container = document.getElementById('log-list');
            if(!logs.length) {
                container.innerHTML = '<div class="text-center text-slate-400 text-sm py-8">尚無紀錄</div>';
                return;
            }
            container.innerHTML = logs.map((log, index) => `
                <div onclick="showLogDetail(${index})" class="bg-slate-50 p-4 rounded-xl border border-slate-100 mb-3 hover:border-blue-300 hover:bg-blue-50 cursor-pointer transition-all active:scale-95 group">
                    <p class="text-[10px] text-slate-400 font-bold group-hover:text-blue-400">${log[0]}</p>
                    <p class="text-sm font-black text-slate-700 mt-1">${log[2]}</p>
                    <p class="text-xs text-blue-500 font-bold mt-1 flex items-center gap-1">
                        <i class="fa-solid fa-user-check"></i> <span class="truncate">${log[1]}</span>
                    </p>
                </div>
            `).join('');
        }

        function setSyncStatus(type, text) {
            const statusEl = document.getElementById('sync-status');
            statusEl.innerText = text;
            statusEl.className = `text-xs font-bold flex items-center gap-2 ${type === 'loading' ? 'text-blue-500' : type === 'error' ? 'text-red-500' : 'text-emerald-500'}`;
        }

        window.onload = init;
    </script>
</body>
</html>
