<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具櫃雲端清點系統 - 持久化存儲版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .tab-active { background-color: #2563eb; color: white; border-color: #2563eb; }
        .tab-summary { background-color: #f59e0b; color: white; border-color: #d97706; }
        
        /* 載入動畫 */
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background-color: white; }
        }

        /* 加大輸入框箭頭 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            opacity: 1;
            height: 30px;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- 頂部導覽列 -->
    <nav class="bg-white shadow-sm border-b no-print sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i class="fa-solid fa-toolbox"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">工具櫃管理系統</h1>
            </div>
            <div id="sync-status" class="text-xs font-medium text-slate-400 flex items-center gap-2">
                <i class="fa-solid fa-cloud-check text-emerald-500"></i> 雲端已同步
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- 頁面區域選擇 -->
        <div id="tab-container" class="no-print flex flex-wrap gap-2 mb-8 justify-center"></div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- 工具列表 -->
            <div class="lg:col-span-3">
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <div class="p-6 bg-slate-50 border-b flex justify-between items-end">
                        <div>
                            <h2 id="current-tab-name" class="text-2xl font-black text-slate-800 tracking-tighter">載入中...</h2>
                            <p class="text-sm text-slate-500 mt-1 font-medium">最後同步時間: <span id="last-sync-time" class="font-mono text-blue-600">--:--</span></p>
                        </div>
                        <div class="flex gap-6">
                            <div class="text-center">
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">正常項目</p>
                                <p id="stat-ok" class="text-2xl font-black text-emerald-500">0</p>
                            </div>
                            <div class="text-center">
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">異常項目</p>
                                <p id="stat-fail" class="text-2xl font-black text-red-500">0</p>
                            </div>
                        </div>
                    </div>

                    <div id="tool-list" class="divide-y divide-slate-100 min-h-[400px]">
                        <!-- 工具會在這裡顯示 -->
                    </div>

                    <div id="summary-notice" class="hidden p-4 bg-amber-50 border-t border-amber-100 text-amber-700 text-xs font-bold text-center no-print">
                        <i class="fa-solid fa-circle-info mr-1"></i> 異常匯總模式下僅供檢視。如需修改實點數量，請切換至該工具所屬區域頁面。
                    </div>

                    <div class="p-6 bg-slate-50 border-t space-y-4 no-print">
                        <div class="flex flex-col md:flex-row gap-4">
                            <div class="flex-1 relative">
                                <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                                <input type="text" id="user-name" placeholder="清點人員姓名" class="w-full pl-10 pr-4 py-4 border rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold text-lg">
                            </div>
                            <div class="flex gap-2">
                                <button onclick="saveData()" id="save-btn" class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white font-black py-4 px-10 rounded-2xl transition shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                                    <i class="fa-solid fa-cloud-arrow-up text-xl"></i> 同步存檔
                                </button>
                                <button onclick="window.print()" class="bg-white hover:bg-slate-100 text-slate-700 font-bold py-4 px-6 rounded-2xl transition border border-slate-200">
                                    <i class="fa-solid fa-print"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 歷史紀錄 (側邊欄) -->
            <div class="lg:col-span-1 no-print">
                <div class="bg-white rounded-2xl shadow-sm border p-6 sticky top-24">
                    <h3 class="font-bold text-slate-800 mb-6 flex items-center gap-2 text-lg">
                        <i class="fa-solid fa-clock-rotate-left text-blue-500"></i> 最近清點紀錄
                    </h3>
                    <div id="log-list" class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
                        <div class="flex flex-col items-center justify-center py-8 text-slate-300">
                            <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
                            <span class="text-xs">讀取紀錄中...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz6x9_Gyesh2iH5RsnKJ1CQiNmhBDdl1aNOh9jaAv1-FNobfYwCj3vs-1GQ6FxHdT_ZDw/exec"; 
        const CACHE_KEY = "TOOL_INVENTORY_CACHE";

        let inventory = [];
        let logs = [];
        let currentTab = "";
        const SUMMARY_TAB = "異常匯總";

        // 初始化
        async function init() {
            setSyncStatus("loading", "正在連線雲端...");
            
            // 先嘗試從快照讀取
            const cached = localStorage.getItem(CACHE_KEY);
            if(cached) {
                inventory = JSON.parse(cached);
                const categories = [...new Set(inventory.map(item => item.category))];
                if (!currentTab) currentTab = categories[0];
                renderUI(categories);
            }

            try {
                // 正式從 API 取得資料
                const res = await fetch(API_URL);
                const data = await res.json();
                
                inventory = data.inventory;
                logs = data.logs; // 確保取得 logs
                
                localStorage.setItem(CACHE_KEY, JSON.stringify(inventory));
                
                const categories = [...new Set(inventory.map(item => item.category))];
                if (!currentTab || currentTab === "載入中...") currentTab = categories[0];
                
                renderUI(categories);
                setSyncStatus("success", "已與雲端同步");
                document.getElementById('last-sync-time').innerText = new Date().toLocaleTimeString();
            } catch (err) {
                console.error(err);
                setSyncStatus("error", "連線失敗，目前為離線模式");
                // 離線時嘗試渲染歷史，如果本地有存
                renderLogs();
            }
        }

        function setSyncStatus(type, text) {
            const statusEl = document.getElementById('sync-status');
            statusEl.innerText = text;
            statusEl.className = `text-xs font-bold flex items-center gap-2 ${type === 'loading' ? 'text-blue-500' : type === 'error' ? 'text-red-500' : 'text-emerald-500'}`;
        }

        function renderUI(categories) {
            if(!categories) categories = [...new Set(inventory.map(item => item.category))];
            renderTabs(categories);
            renderTools();
            renderLogs();
        }

        function renderTabs(categories) {
            const container = document.getElementById('tab-container');
            const allTabs = [...categories, SUMMARY_TAB];
            container.innerHTML = allTabs.map(cat => {
                let activeClass = currentTab === cat ? (cat === SUMMARY_TAB ? 'tab-summary' : 'tab-active') : 'bg-white text-slate-500 border-white hover:border-blue-200 shadow-sm';
                return `<button onclick="switchTab('${cat}')" class="px-6 py-2 rounded-xl font-black transition-all border-2 ${activeClass}">${cat}</button>`;
            }).join('');
        }

        function switchTab(cat) {
            currentTab = cat;
            renderUI();
        }

        function updateLocalValue(id, newVal) {
            const item = inventory.find(i => i.id == id);
            if (item) {
                item.current = parseInt(newVal) || 0;
                localStorage.setItem(CACHE_KEY, JSON.stringify(inventory));
                renderTools();
                setSyncStatus("error", "有變更尚未同步");
            }
        }

        function renderTools() {
            const container = document.getElementById('tool-list');
            const notice = document.getElementById('summary-notice');
            let ok = 0, fail = 0;

            if (currentTab === SUMMARY_TAB) {
                notice.classList.remove('hidden');
                document.getElementById('current-tab-name').innerText = "異常匯總報告";
                const shortages = inventory.filter(i => (i.current || 0) < i.standard);
                const surpluses = inventory.filter(i => (i.current || 0) > i.standard);
                
                let html = '<div class="p-4 bg-red-50 text-red-600 font-black border-b flex items-center gap-2"><i class="fa-solid fa-circle-minus"></i> 盤差 (缺件項目)</div>';
                html += shortages.length ? shortages.map(i => generateRow(i, true, true)).join('') : '<div class="p-8 text-center text-slate-400 text-sm">目前無缺件項目</div>';
                
                html += '<div class="p-4 bg-emerald-50 text-emerald-600 font-black border-b mt-4 flex items-center gap-2"><i class="fa-solid fa-circle-plus"></i> 盤盈 (多件項目)</div>';
                html += surpluses.length ? surpluses.map(i => generateRow(i, true, true)).join('') : '<div class="p-8 text-center text-slate-400 text-sm">目前無多件項目</div>';
                
                container.innerHTML = html;
                fail = shortages.length + surpluses.length;
                ok = inventory.length - fail;
            } else {
                notice.classList.add('hidden');
                document.getElementById('current-tab-name').innerText = currentTab;
                const displayItems = inventory.filter(i => i.category === currentTab);
                container.innerHTML = displayItems.map(i => {
                    if (i.current != i.standard) fail++; else ok++;
                    return generateRow(i, false, false);
                }).join('');
            }
            
            document.getElementById('stat-ok').innerText = ok;
            document.getElementById('stat-fail').innerText = fail;
        }

        function generateRow(item, showCategory, isReadOnly) {
            const isErr = item.current != item.standard;
            const diff = (item.current || 0) - item.standard;
            
            return `
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between p-5 ${isErr ? 'bg-orange-50/40' : 'hover:bg-slate-50'} transition-colors border-b last:border-0">
                    <div class="flex-1 min-w-0 mb-4 sm:mb-0">
                        <div class="flex items-center gap-2">
                            <span class="font-black text-slate-800 text-xl tracking-tight truncate">${item.name}</span>
                            <span class="text-xs text-slate-400 font-bold bg-slate-100 px-2 py-0.5 rounded">/ ${item.unit || '個'}</span>
                        </div>
                        <div class="flex flex-wrap gap-x-4 mt-1.5">
                            <p class="text-[11px] text-slate-400 font-bold">編號: <span class="text-slate-600 font-mono">${item.id}</span></p>
                            ${showCategory ? `<p class="text-[11px] text-slate-400 font-bold">區域: <span class="text-blue-600">${item.category}</span></p>` : ''}
                        </div>
                    </div>

                    <div class="flex items-center gap-6 w-full sm:w-auto justify-between sm:justify-end">
                        <!-- 標準數量 (左) -->
                        <div class="text-center min-w-[70px]">
                            <p class="text-[10px] text-slate-400 font-black uppercase mb-0.5">標配</p>
                            <p class="text-2xl font-black text-black tracking-tighter">${item.standard}</p>
                        </div>

                        <!-- 實點輸入 (中) -->
                        <div class="text-center">
                            <p class="text-[10px] ${isReadOnly ? 'text-slate-400' : 'text-blue-500'} font-black uppercase mb-1">實點數量</p>
                            <input type="number" value="${item.current || 0}" 
                                ${isReadOnly ? 'readonly' : ''}
                                onchange="updateLocalValue(${item.id}, this.value)"
                                class="w-20 border-2 rounded-xl py-2.5 text-center font-black text-2xl outline-none transition-all ${isReadOnly ? 'bg-slate-50 border-slate-100 text-slate-400 cursor-not-allowed' : (isErr ? 'border-orange-500 text-orange-600 bg-orange-50 focus:ring-4 focus:ring-orange-100' : 'border-slate-200 text-blue-600 focus:ring-4 focus:ring-blue-100')}">
                        </div>

                        <!-- 盤點差 (右) -->
                        <div class="text-center min-w-[70px]">
                            <p class="text-[10px] text-slate-400 font-black uppercase mb-0.5">盤點差</p>
                            <div class="text-2xl font-black tracking-tighter ${diff === 0 ? 'text-slate-200' : (diff < 0 ? 'text-red-500' : 'text-emerald-500')}">
                                ${diff > 0 ? '+' : ''}${diff}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function saveData() {
            const user = document.getElementById('user-name').value.trim();
            if (!user) return alert("請輸入您的姓名再進行同步。");
            
            const btn = document.getElementById('save-btn');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 同步中...';

            try {
                // 發送更新數據
                await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "update", data: inventory }) });
                // 發送日誌紀錄
                await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "log", user: user, event: "清點資料存檔" }) });
                
                alert("存檔成功！資料已同步至雲端試算表。");
                localStorage.removeItem(CACHE_KEY); 
                location.reload();
            } catch (err) {
                alert("連線失敗，請檢查網路。");
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        }

        function renderLogs() {
            const container = document.getElementById('log-list');
            if(!logs || logs.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 text-sm py-8 italic font-medium">尚無歷史紀錄</div>';
                return;
            }
            
            container.innerHTML = logs.map(log => {
                const date = new Date(log[0]);
                const timeStr = isNaN(date.getTime()) ? log[0] : date.toLocaleString('zh-TW', {hour12:false});
                const event = log[1];
                const userName = log[2];

                return `
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 mb-3 last:mb-0 hover:border-blue-200 transition-colors">
                    <p class="text-[10px] text-slate-400 font-bold font-mono">${timeStr}</p>
                    <p class="text-sm font-black text-slate-700 mt-1">${event}</p>
                    <div class="flex items-center justify-between mt-2">
                        <span class="text-xs text-blue-500 font-bold flex items-center gap-1">
                            <i class="fa-solid fa-user-check"></i> ${userName}
                        </span>
                    </div>
                </div>
                `;
            }).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
